name: Remove Post

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: '삭제할 Threads 게시글 ID'
        required: true

jobs:
  remove:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Delete post and rebuild pages
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          POST_ID: ${{ github.event.inputs.post_id }}
        run: python scripts/remove_post.py

      - name: Commit pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/feed.html || true
          git diff --staged --quiet || git commit -m "fix: 비쿠팡 게시글 삭제 후 페이지 재생성"
          git push
